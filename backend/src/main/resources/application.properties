# ===================================================
#  Smart Campus Resource Management Platform
#  application.properties — development defaults
# ===================================================

spring.application.name=backend

# ===== SERVER =====
server.port=8080
server.servlet.context-path=/api/v1

# ===== DATASOURCE =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartcampus}
spring.datasource.username=${DB_USER:smartcampus}
spring.datasource.password=${DB_PASSWORD:smartcampus}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ===== OAUTH2 — Google =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/api/v1/oauth2/callback/{registrationId}}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# ===== JWT =====
# RSA key pair — in production supply via env vars (PEM base64-encoded)
# Leave blank to auto-generate an in-memory key pair at startup (dev only)
app.jwt.private-key=${JWT_PRIVATE_KEY:}
app.jwt.public-key=${JWT_PUBLIC_KEY:}
app.jwt.access-token-expiry-seconds=${JWT_ACCESS_EXPIRY:900}
app.jwt.refresh-token-expiry-seconds=${JWT_REFRESH_EXPIRY:604800}
app.jwt.issuer=smart-campus

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===== FRONTEND =====
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.success-redirect=${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/oauth/callback}

# ===== SPRINGDOC / SWAGGER UI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false

# ===== ACTUATOR =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===== LOGGING =====
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
