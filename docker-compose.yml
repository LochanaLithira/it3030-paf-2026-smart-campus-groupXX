# =============================================
#  Smart Campus Resource Management Platform
#  Docker Compose — Full Stack
#  Services: PostgreSQL 16 + pgAdmin + Backend
# =============================================

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartcampus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-smartcampus}
      POSTGRES_USER:     ${DB_USER:-smartcampus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartcampus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00_init_extensions.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-smartcampus} -d ${DB_NAME:-smartcampus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smartcampus-net
    
  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: smartcampus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-smartcampus}
      DB_USER:     ${DB_USER:-smartcampus}
      DB_PASSWORD: ${DB_PASSWORD:-smartcampus}

      # JWT (leave blank to auto-generate ephemeral key on each restart — DEV only)
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY:  ${JWT_PUBLIC_KEY:-}
      JWT_ACCESS_EXPIRY:  ${JWT_ACCESS_EXPIRY:-900}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800}

      # Google OAuth2
      #GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-your-google-client-id}
      #GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}

      # CORS
      CORS_ORIGINS:   ${CORS_ORIGINS:-http://localhost:5173}
      FRONTEND_URL:   ${FRONTEND_URL:-http://localhost:5173}
      OAUTH2_SUCCESS_REDIRECT: ${OAUTH2_SUCCESS_REDIRECT:-http://localhost:5173/oauth/callback}

      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8080/api/v1/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    networks:
      - smartcampus-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: smartcampus-postgres-data
  pgadmin_data:
    name: smartcampus-pgadmin-data

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  smartcampus-net:
    name: smartcampus-net
    driver: bridge
